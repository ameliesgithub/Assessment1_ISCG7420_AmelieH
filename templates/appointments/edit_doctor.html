{% extends 'base.html' %}

{% block content %}
    <h1>Edit Doctor Details</h1>

    <form method="post">
        {% csrf_token %}

        <label>Name:</label><br>
        <input type="text" name="name" value="{{ doctor.name }}" required><br><br>

        <label>Speciality:</label><br>
        <input type="text" name="speciality" value="{{ doctor.speciality }}" required><br><br>

        <button type="submit">Save Changes</button>
    </form>

{% endblock %}
