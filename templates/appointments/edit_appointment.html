{% extends 'base.html' %}

{% block content %}
    <h1>Edit Appointment</h1>

    <form method="post">
        {% csrf_token %}
        <label>Choose new slot:</label>
        <select name="slot_id">
            {% for slot in slots %}
                <option value="{{ slot.id }}"
                {% if slot.id == appointment.slot.id %}selected{% endif %}>
                    {{ slot.doctor.name }} - {{ slot.date }} {{ slot.time }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Save Changes</button>
    </form>
{% endblock %}
